{% extends "base.html" %}
{# Authenticated app chrome: brand + nav + account header. #}
{% block body %}
<div class="kg-app">
  <header class="kg-header">
    <a class="kg-brand" href="{% url 'clips_search' %}">clip.cool</a>
    <nav class="kg-nav">
      <a href="{% url 'clips_library' %}"{% if active_page == 'clips_library' %} class="is-active"{% endif %}>My clips</a>
      <a href="{% url 'clips_search' %}"{% if active_page == 'clips' %} class="is-active"{% endif %}>Search</a>
      <a href="{% url 'clips_create' %}"{% if active_page == 'clips_create' %} class="is-active"{% endif %}>Create</a>
      <a href="{% url 'clips_upload' %}"{% if active_page == 'clips_upload' %} class="is-active"{% endif %}>Upload</a>
      <a href="https://github.com/jaigner-hub/snipper/releases/latest" target="_blank" rel="noopener">Get Snipper ↗</a>
    </nav>
    <div class="kg-account">
      <span class="kg-user kg-muted">{{ user.email }}</span>
      <a class="kg-acct-link" href="{% url 'account_password' %}?next={{ request.get_full_path|urlencode }}">Password</a>
      {% if user.is_staff %}<a class="kg-acct-link" href="{{ admin_url }}">Admin</a>{% endif %}
      <a class="kg-acct-link" href="/api/v1/docs" target="_blank" rel="noopener">API</a>
      <form method="post" action="/oidc/logout/">
        {% csrf_token %}
        <button type="submit" class="kg-btn kg-btn-sm">Log out</button>
      </form>
    </div>
  </header>
  <main class="kg-main">
    {% block app_content %}{% endblock %}
  </main>
</div>
{% endblock %}
