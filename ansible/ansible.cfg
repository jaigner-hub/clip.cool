[defaults]
inventory = inventory.yml
roles_path = roles
# Auto-decrypt SOPS-encrypted group_vars/host_vars (community.sops vars plugin).
vars_plugins_enabled = host_group_vars,community.sops.sops
# YAML-formatted output now lives in the builtin default callback (community.general.yaml was removed in v12).
stdout_callback = default
result_format = yaml
nocows = True
# Dev box (vent.dog) is reimaged often, so its host key changes — accept new keys.
# Revisit (pin/verify) before any staging/prod targets are added.
host_key_checking = False

[ssh_connection]
pipelining = True
