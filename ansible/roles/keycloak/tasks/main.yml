---
- name: Create Keycloak compose dir
  ansible.builtin.file:
    path: "{{ keycloak_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Render .env (secrets from SOPS)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ keycloak_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Render compose.yml
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ keycloak_dir }}/compose.yml"
    owner: root
    group: root
    mode: "0640"

- name: Install custom Keycloak login theme(s)
  ansible.builtin.copy:
    src: themes/
    dest: "{{ keycloak_themes_dir }}/"
    owner: root
    group: root
    mode: "0644"
    directory_mode: "0755"
  register: kc_themes

- name: Ensure the shared edge network exists
  ansible.builtin.command: docker network create keygrip-edge
  register: _edge_net
  changed_when: _edge_net.rc == 0
  failed_when: _edge_net.rc != 0 and 'already exists' not in _edge_net.stderr

# Keycloak is host-networked (8080 HTTP, 9000 mgmt/metrics on the host). Let docker containers reach
# them via host-gateway (the local app/cloudflared on 8080; Prometheus on 9000). The public interface
# stays ufw-denied; the docker range is non-routable from the internet. Cross-box 9000 (Prometheus ->
# the other node) rides tailscale0 (already allowed).
- name: Allow docker containers to reach Keycloak's HTTP + mgmt ports (host-networked)
  community.general.ufw:
    rule: allow
    src: "172.16.0.0/12"
    port: "{{ item }}"
    proto: tcp
    comment: "keygrip -> Keycloak (host net)"
  loop: ["8080", "9000"]

- name: Bring up the Keycloak stack
  community.docker.docker_compose_v2:
    project_src: "{{ keycloak_dir }}"
    state: present
    pull: missing
    remove_orphans: true   # clean the now-removed standalone postgres / stack cloudflared

- name: Wait for Keycloak to serve (/realms/master)
  ansible.builtin.uri:
    url: "http://127.0.0.1:8080/realms/master"
    status_code: 200
  register: kc_ready
  until: kc_ready.status == 200
  retries: 40
  delay: 5
