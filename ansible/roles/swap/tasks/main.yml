---
- name: Check currently active swap
  ansible.builtin.command: swapon --show=NAME --noheadings
  register: swap_active
  changed_when: false

- name: Allocate the swap file ({{ swap_size_mb }} MiB)
  ansible.builtin.command: "fallocate -l {{ swap_size_mb }}M {{ swap_file }}"
  args:
    creates: "{{ swap_file }}"
  when: swap_file not in swap_active.stdout

- name: Secure swap file permissions (0600)
  ansible.builtin.file:
    path: "{{ swap_file }}"
    owner: root
    group: root
    mode: "0600"

- name: Format the swap area
  ansible.builtin.command: "mkswap {{ swap_file }}"
  when: swap_file not in swap_active.stdout
  register: mkswap_res
  changed_when: mkswap_res.rc == 0

- name: Enable swap now
  ansible.builtin.command: "swapon {{ swap_file }}"
  when: swap_file not in swap_active.stdout
  changed_when: true

- name: Persist swap in /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "^{{ swap_file | regex_escape }}\\s"
    line: "{{ swap_file }} none swap sw 0 0"
    state: present

- name: Persist vm.swappiness
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-keygrip-swap.conf
    content: "vm.swappiness = {{ swappiness }}\n"
    owner: root
    group: root
    mode: "0644"
  register: swappiness_conf

- name: Apply vm.swappiness now
  ansible.builtin.command: "sysctl -w vm.swappiness={{ swappiness }}"
  changed_when: swappiness_conf.changed
