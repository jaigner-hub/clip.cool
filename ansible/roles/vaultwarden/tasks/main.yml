---
- name: Ensure vaultwarden dir
  ansible.builtin.file:
    path: "{{ vaultwarden_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Render .env (secrets)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ vaultwarden_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Render compose.yml
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ vaultwarden_dir }}/compose.yml"
    owner: root
    group: root
    mode: "0640"

- name: Bring up Vaultwarden
  community.docker.docker_compose_v2:
    project_src: "{{ vaultwarden_dir }}"
    state: present
    pull: missing
