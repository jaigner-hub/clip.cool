---
app_dir: /opt/keygrip/webapp   # platform install root stays /opt/keygrip (shared with the chat stack)
# Public hostname: the clip.cool apex (HA via a CF Load Balancer across both boxes). app.vent.dog
# was retired.
app_hostname: clip.cool
# Extra hosts also served + CSRF-trusted (none now; app.vent.dog retired).
app_alt_hostnames: []
# Tailnet (Tailscale Serve) host:port the app is also reachable on — the break-glass path:
# the ONLY host where the admin password login form is served (ADR 0002; /admin itself is public).
# Must match the serve mapping in playbooks/serve.yml and the clip-web redirect URI in
# roles/keycloak_realm.
app_tailnet_host: vent-keygrip.tail1ec6c3.ts.net
app_tailnet_https_port: 8447
keycloak_issuer: "https://id.clip.cool/realms/keygrip"
# Internal Keycloak base for JWKS + admin API (skips Cloudflare's urllib-UA 403). Keycloak is
# host-networked on each box (HA cluster), so the app reaches its LOCAL Keycloak via host-gateway
# (webapp/worker already carry extra_hosts: host.docker.internal:host-gateway).
keycloak_internal_base: "http://host.docker.internal:8080"
app_db_name: clip
app_db_user: clip
# Zero-downtime rolling deploy: drain each box from the CF LB before recreating it (clip-web.yml
# runs serial: 1). Reuses the drain helper installed by the `drain` role. Set false to fall back to
# the old in-place recreate (e.g. if the LB isn't up).
clip_web_rolling: true
clip_web_drain_script: /opt/keygrip/drain/drain.sh
# Purge the clip.cool CF cache after the rolling deploy (clears any 404 cached mid-roll for a new
# content-hashed static asset). Needs the API token to carry Cache Purge. Set false to skip.
clip_web_purge_cache: true
app_postgres_image: "postgres:16-alpine"
postgres_exporter_image: "quay.io/prometheuscommunity/postgres-exporter:v0.16.0"
# Procrastinate worker replicas (ADR 0008). >1 proves multiple workers coordinate via Postgres
# row-locking (no double-processing). Cheap — each is a single async process (~55 MiB idle).
# NOTE: this is N processes on ONE box (node-level). True cross-box/datacenter HA coordination
# must be re-tested once a 2nd-region origin exists (funding-gated) — see docs/foundation-backlog.md.
worker_replicas: 4
# CPU cap for the dedicated heavy-encode worker (worker-transcode) so AV1/burn ffmpeg can't peg the
# shared box (web + DB + Keycloak + chat live here too). A string like "2" / "1.5".
transcode_worker_cpus: "2"
# Shutdown grace for worker-transcode. A deploy recreates the container (image rebuild); Procrastinate
# stops fetching new jobs on SIGTERM and finishes the in-flight encode, so Docker must wait this long
# before SIGKILL — otherwise a running ffmpeg is killed and its job is left stuck in `doing`. Covers a
# typical meme-length encode; longer than the per-ffmpeg 600s timeout would just stall deploys.
transcode_stop_grace_period: "300s"

# --- Distributed tracing (infra-gap-analysis.md #7, ADR 0015) ---
# OTLP/gRPC endpoint the app exports spans to: Alloy on the shared `edge` net, which forwards to
# Tempo. Blank it to disable tracing (keygrip/tracing.py is a no-op without this).
app_otel_endpoint: "http://alloy:4317"
# Sample EVERY request on the dev box — low traffic, and you want to see the call you just made
# (10% sampling makes a handful of manual API calls vanish). Dial down per-env once prod has volume.
app_otel_sample_rate: "1.0"

# --- Cloudflare R2 object storage (docs/architecture.md) ---
# ALL R2 config lives in stash under clip/web/* (AUTO mode → app .env): R2_ACCESS_KEY_ID,
# R2_SECRET_ACCESS_KEY, R2_S3_API_ENDPOINT, R2_BUCKET_NAME, R2_API_TOKEN, and optional
# R2_PUBLIC_BASE. Nothing R2 is templated here — see compose.yml.j2's x-app-env passthrough.

# --- Typesense search (docs/architecture.md) ---
# Single instance on vent.dog (playbooks/typesense.yml, hosts: primary). vent.dog's own app reaches
# it by the edge-net name `typesense`; vent.dog2 overrides search_host to vent.dog's tailnet IP in
# inventory.yml. The API key is a SECRET — it arrives via stash (clip/web/TYPESENSE_API_KEY).
search_host: "typesense"
search_port: "8108"
search_protocol: "http"
