---
- name: Ensure app dirs exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ app_dir }}"
    - "{{ app_dir }}/src"

- name: Archive the committed app/ source (on the controller)
  delegate_to: localhost
  ansible.builtin.command:
    cmd: git -c safe.directory=/work -C /work archive --format=tar -o /tmp/keygrip-app.tar HEAD:app
  changed_when: true

- name: Copy app source tarball to the box
  ansible.builtin.copy:
    src: /tmp/keygrip-app.tar
    dest: "{{ app_dir }}/src.tar"
    mode: "0644"

- name: Extract app source
  ansible.builtin.unarchive:
    src: "{{ app_dir }}/src.tar"
    dest: "{{ app_dir }}/src"
    remote_src: true

- name: Render app compose
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ app_dir }}/compose.yml"
    owner: root
    group: root
    mode: "0644"

# Secrets now come from stash (ADR 0018): the stash agent renders clip/web/* to
# /run/clip/web.env (tmpfs) and we point compose's .env at it via a symlink, so
# no plaintext secret persists on disk. (env.j2 is kept for break-glass rollback.)
# NOTE: path + prefix renamed kg→clip with the rest of the app tier; the stash
# CLUSTER must hold the app secrets under `clip/web/*` for the agent to render them.
- name: Check the stash agent has rendered the secrets
  ansible.builtin.stat:
    path: /run/clip/web.env
  register: _stash_web_env

- name: Require the stash-rendered env before flipping the app to it
  ansible.builtin.assert:
    that: _stash_web_env.stat.exists
    fail_msg: >-
      /run/clip/web.env is missing — run/start stash-agent first
      (it is a role in this play; check `systemctl status stash-agent`).

- name: Point app .env at the stash-rendered env (tmpfs; secrets via stash agent)
  ansible.builtin.file:
    src: /run/clip/web.env
    dest: "{{ app_dir }}/.env"
    state: link
    force: true

- name: Ensure the shared edge network exists
  ansible.builtin.command: docker network create keygrip-edge
  register: _edge_net
  changed_when: _edge_net.rc == 0
  failed_when: _edge_net.rc != 0 and 'already exists' not in _edge_net.stderr

# --- Zero-downtime rolling deploy (clip-web.yml runs serial: 1) ---
# With the play serialized to one box at a time, drain THIS box from the CF LB before recreating its
# containers (so the peer serves every request during the recreate gap — no 502s), then re-add it
# once /readyz is green. drain.sh `lb-out` toggles the origin off immediately (no 60s monitor lag)
# and does NOT switch over Postgres (an app deploy doesn't touch the DB). No-op if drain isn't
# installed (degrades to the old in-place recreate).
- name: Check for the drain helper
  ansible.builtin.stat:
    path: "{{ clip_web_drain_script }}"
  register: _drain_script

- name: Drain this box from the load balancer
  ansible.builtin.command: "{{ clip_web_drain_script }} lb-out"
  changed_when: true
  when: clip_web_rolling | bool and _drain_script.stat.exists

# Decoupled deploy: recreate ONLY the webapp (this box is LB-drained) so a deploy never disturbs an
# in-flight encode on the workers. `--no-deps` leaves worker/worker-transcode running on their old
# containers; `--build` produces the new image both tiers will use. ~90% of deploys are web-only, so
# this is the common, fast path and encodes keep running.
- name: Build the image + (re)create the webapp only (--no-deps → workers + encodes untouched)
  ansible.builtin.command:
    cmd: docker compose -f {{ app_dir }}/compose.yml up -d --build --no-deps webapp
  changed_when: true

- name: Run database migrations
  ansible.builtin.command:
    cmd: docker compose -f {{ app_dir }}/compose.yml exec -T webapp python manage.py migrate --noinput
  changed_when: true

# Put the box back in the pool BEFORE recreating workers, so user-facing downtime is just the (fast)
# webapp recreate — never gated on the worker tier.
- name: Re-add this box to the load balancer (waits for local /readyz, then enables the origin)
  ansible.builtin.command: "{{ clip_web_drain_script }} undrain"
  changed_when: true
  when: clip_web_rolling | bool and _drain_script.stat.exists

# Recreate the workers on the freshly built image. Not user-facing → no LB dance; the short
# transcode_stop_grace_period keeps it quick, and the heartbeat reaper re-queues any encode it
# interrupts. Also lands them cleanly AFTER migrations (no crash-loop on a fresh-DB first deploy).
- name: Recreate the Procrastinate workers on the new image
  ansible.builtin.command:
    cmd: docker compose -f {{ app_dir }}/compose.yml up -d --no-deps worker worker-transcode
  changed_when: true
