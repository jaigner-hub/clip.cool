---
# Base host bootstrap for the new platform (Ubuntu 24.04).
# Run from the ansible/ dir:
#   ansible-galaxy collection install -r requirements.yml   # first time
#   ansible-playbook playbooks/bootstrap.yml
#
# Installs baseline packages, a deploy user, and Docker CE (everything runs in containers).
- name: Bootstrap base host (Ubuntu 24.04) — baseline + Docker
  hosts: dev
  become: true

  tasks:
    - name: Refresh apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install baseline packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
          - unattended-upgrades
        state: present

    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

    # (admin users — e.g. jeff — are created by playbooks/users.yml; run that first.)

    # --- Docker CE (official repo) ---
    - name: Ensure apt keyrings dir exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    - name: Install Docker Engine + Compose plugin
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add admin users to the docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ admin_users }}"

    - name: Sanity — docker version
      ansible.builtin.command: docker --version
      changed_when: false
      register: docker_version

    - name: Show docker version
      ansible.builtin.debug:
        var: docker_version.stdout
